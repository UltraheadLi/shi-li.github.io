<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - Shi Li</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        body { background: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #1d1d1f; line-height: 1.6; padding: 40px 24px; display: flex; flex-direction: column; align-items: center; }
        
        .container { max-width: 800px; width: 100%; background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.4); }
        
        .back-btn { text-decoration: none; color: #0071e3; font-weight: 600; display: inline-block; margin-bottom: 24px; transition: transform 0.3s ease; }
        .back-btn:hover { transform: translateX(-4px); }
        
        #content h1 { font-size: 2.2rem; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 12px; margin-bottom: 24px; }
        #content h2 { margin-top: 32px; margin-bottom: 16px; }
        #content p { margin-bottom: 16px; font-size: 1.1rem; }
        #content img { max-width: 100%; border-radius: 12px; margin: 16px 0; }
        #content pre { background: #f6f8fa; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
        #content code { font-family: monospace; }
        #content blockquote { border-left: 4px solid #0071e3; margin: 0; padding-left: 16px; color: #515154; background: rgba(0,113,227,0.05); padding: 12px 16px; border-radius: 0 8px 8px 0; }
    </style>
</head>
<body>

    <div class="container">
        <a href="blog.html" class="back-btn">← Back to Blog list</a>
        
        <div id="content">Loading article...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if (fileName) {
            // 去 posts 文件夹寻找这个 md 文件
            fetch(`blogs/${extreme-value-theory.md}`)
                .then(response => {
                    if (!response.ok) throw new Error("Article not found");
                    return response.text();
                })
                .then(text => {
                    document.getElementById('content').innerHTML = marked.parse(text);
                    hljs.highlightAll();
                })
                .catch(err => {
                    document.getElementById('content').innerHTML = "<h1>404 Not Found</h1><p>Sorry, the article could not be loaded.</p>";
                });
        } else {
            document.getElementById('content').innerHTML = "<h1>Error</h1><p>No article specified in URL.</p>";
        }
    </script>
</body>
</html>
